services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: mediassist
      POSTGRES_PASSWORD: mediassist
      POSTGRES_DB: mediassist
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mediassist"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://mediassist:mediassist@db:5432/mediassist
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      CHROMA_DIR: /app/chroma_store
      OLLAMA_MODEL: mistral
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    volumes:
      - ./chroma_store:/app/chroma_store
      - ./data.txt:/app/data.txt:ro
    depends_on:
      db:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres_data:
