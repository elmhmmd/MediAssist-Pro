apiVersion: apps/v1
kind: Deployment
metadata:
  name: mediassist-app
  namespace: mediassist
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mediassist-app
  template:
    metadata:
      labels:
        app: mediassist-app
    spec:
      initContainers:
        - name: chroma-init
          image: mediassist-pro:latest
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c"]
          args:
            - |
              if [ -z "$(ls -A ${CHROMA_DIR} 2>/dev/null)" ]; then
                echo "ChromaDB store is empty, running indexer..."
                python rag/indexer.py data.txt --source data.pdf --persist-dir ${CHROMA_DIR}
              else
                echo "ChromaDB store already populated, skipping indexing."
              fi
          env:
            - name: CHROMA_DIR
              valueFrom:
                configMapKeyRef:
                  name: mediassist-config
                  key: CHROMA_DIR
          volumeMounts:
            - name: chroma-storage
              mountPath: /app/chroma_store
      containers:
        - name: mediassist-app
          image: mediassist-pro:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: mediassist-secret
                  key: SECRET_KEY
            - name: DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: mediassist-config
                  key: DATABASE_URL
            - name: OLLAMA_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: mediassist-config
                  key: OLLAMA_BASE_URL
            - name: CHROMA_DIR
              valueFrom:
                configMapKeyRef:
                  name: mediassist-config
                  key: CHROMA_DIR
            - name: OLLAMA_MODEL
              valueFrom:
                configMapKeyRef:
                  name: mediassist-config
                  key: OLLAMA_MODEL
            - name: ALGORITHM
              valueFrom:
                configMapKeyRef:
                  name: mediassist-config
                  key: ALGORITHM
            - name: ACCESS_TOKEN_EXPIRE_MINUTES
              valueFrom:
                configMapKeyRef:
                  name: mediassist-config
                  key: ACCESS_TOKEN_EXPIRE_MINUTES
            - name: MLFLOW_TRACKING_URI
              valueFrom:
                configMapKeyRef:
                  name: mediassist-config
                  key: MLFLOW_TRACKING_URI
          volumeMounts:
            - name: chroma-storage
              mountPath: /app/chroma_store
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30
      volumes:
        - name: chroma-storage
          persistentVolumeClaim:
            claimName: chroma-pvc
