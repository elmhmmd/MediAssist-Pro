apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: mediassist
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: mediassist
        type: file
        options:
          path: /var/lib/grafana/dashboards

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-mediassist
  namespace: mediassist
data:
  mediassist.json: |
    {
      "title": "MediAssist Pro — RAG Monitoring",
      "uid": "mediassist-rag",
      "schemaVersion": 38,
      "refresh": "30s",
      "panels": [
        {
          "id": 1,
          "title": "Request Rate (req/s)",
          "type": "timeseries",
          "gridPos": {"x": 0, "y": 0, "w": 12, "h": 6},
          "targets": [{
            "expr": "sum(rate(http_requests_total{job=\"mediassist-app\"}[1m]))",
            "legendFormat": "req/s"
          }]
        },
        {
          "id": 2,
          "title": "Latency p50 / p95 / p99",
          "type": "timeseries",
          "gridPos": {"x": 12, "y": 0, "w": 12, "h": 6},
          "targets": [
            {"expr": "histogram_quantile(0.50, sum(rate(http_request_duration_seconds_bucket{job=\"mediassist-app\"}[5m])) by (le))", "legendFormat": "p50"},
            {"expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job=\"mediassist-app\"}[5m])) by (le))", "legendFormat": "p95"},
            {"expr": "histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{job=\"mediassist-app\"}[5m])) by (le))", "legendFormat": "p99"}
          ]
        },
        {
          "id": 3,
          "title": "Error Rate",
          "type": "timeseries",
          "gridPos": {"x": 0, "y": 6, "w": 12, "h": 6},
          "targets": [{
            "expr": "sum(rate(http_requests_total{job=\"mediassist-app\",status=~\"5..\"}[5m])) / sum(rate(http_requests_total{job=\"mediassist-app\"}[5m]))",
            "legendFormat": "error rate"
          }]
        },
        {
          "id": 4,
          "title": "Pod Status",
          "type": "stat",
          "gridPos": {"x": 12, "y": 6, "w": 12, "h": 6},
          "targets": [{
            "expr": "kube_pod_status_phase{namespace=\"mediassist\",phase=\"Running\"}",
            "legendFormat": "{{pod}}"
          }]
        }
      ]
    }
