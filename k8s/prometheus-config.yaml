apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: mediassist
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    rule_files:
      - /etc/prometheus/alerts.yml

    alerting:
      alertmanagers: []

    scrape_configs:
      - job_name: mediassist-app
        static_configs:
          - targets: ["mediassist-service:80"]
        metrics_path: /metrics

      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [mediassist]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"

  alerts.yml: |
    groups:
      - name: mediassist-alerts
        rules:
          - alert: HighLatencyP95
            expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job="mediassist-app"}[5m])) by (le)) > 5
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "p95 latency exceeded 5s"
              description: "p95 response time is {{ $value }}s"

          - alert: HighErrorRate
            expr: sum(rate(http_requests_total{job="mediassist-app",status=~"5.."}[5m])) / sum(rate(http_requests_total{job="mediassist-app"}[5m])) > 0.05
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "Error rate exceeded 5%"
              description: "Error rate is {{ $value | humanizePercentage }}"

          - alert: PodNotRunning
            expr: kube_pod_status_phase{namespace="mediassist",phase!="Running"} > 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Pod not running in mediassist namespace"
              description: "Pod {{ $labels.pod }} is in phase {{ $labels.phase }}"
