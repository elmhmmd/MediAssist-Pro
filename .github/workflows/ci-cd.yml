name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/mediassist-pro

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  test:
    name: Run tests
    runs-on: ubuntu-latest

    env:
      # conftest.py overrides the DB engine with SQLite — no postgres needed
      DATABASE_URL: sqlite:///./test.db
      SECRET_KEY: test-secret-key-for-ci
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      CHROMA_DIR: chroma_store
      OLLAMA_MODEL: mistral
      OLLAMA_BASE_URL: http://localhost:11434

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv pip install --system -r requirements.lock

      - name: Run tests
        run: pytest tests/ -v --tb=short

  # ────────────────────────────────────────────────────────────────────────────
  build-push:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    outputs:
      sha_tag: ${{ steps.meta.outputs.sha_tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute tags
        id: meta
        run: |
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "sha_tag=${SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.sha_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ────────────────────────────────────────────────────────────────────────────
  validate-k8s:
    name: Validate Kubernetes manifests
    runs-on: ubuntu-latest
    needs: build-push
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Start Minikube
        uses: medyagh/setup-minikube@latest
        with:
          driver: docker

      - name: Create namespace and secret
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl create secret generic mediassist-secret \
            --from-literal=SECRET_KEY=${{ secrets.SECRET_KEY }} \
            --from-literal=POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }} \
            --namespace=mediassist \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Validate manifests (dry-run)
        run: |
          kubectl apply --dry-run=server -f k8s/configmap.yaml
          kubectl apply --dry-run=server -f k8s/postgres-pvc.yaml
          kubectl apply --dry-run=server -f k8s/postgres-deployment.yaml
          kubectl apply --dry-run=server -f k8s/postgres-service.yaml
          kubectl apply --dry-run=server -f k8s/chroma-pvc.yaml
          kubectl apply --dry-run=server -f k8s/app-deployment.yaml
          kubectl apply --dry-run=server -f k8s/app-service.yaml
          kubectl apply --dry-run=server -f k8s/prometheus-config.yaml
          kubectl apply --dry-run=server -f k8s/prometheus-deployment.yaml
          kubectl apply --dry-run=server -f k8s/prometheus-service.yaml
          kubectl apply --dry-run=server -f k8s/grafana-deployment.yaml
          kubectl apply --dry-run=server -f k8s/grafana-service.yaml
          kubectl apply --dry-run=server -f k8s/mlflow-pvc.yaml
          kubectl apply --dry-run=server -f k8s/mlflow-deployment.yaml
          kubectl apply --dry-run=server -f k8s/mlflow-service.yaml
